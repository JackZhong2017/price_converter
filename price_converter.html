<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>电商价格转换计算器</title>
    <style>
        body {
            font-family: '微软雅黑', Arial, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
        }
        .container {
            display: flex;
            gap: 30px;
        }
        .input-section, .output-section {
            flex: 1;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h2>电商促销价格转换计算器</h2>
    <div class="container">
        <!-- 输入区 -->
        <div class="input-section">
            <div class="input-group">
                <label>原活动满减条件（例如300-50）：</label>
                <input type="number" id="originalFull" placeholder="满减金额（满）" step="100">
                <input type="number" id="originalReduce" placeholder="减多少" step="10">
            </div>
            
            <div class="input-group">
                <label>原标价（x）：</label>
                <input type="number" id="originalPrice" placeholder="请输入原标价">
            </div>

            <div class="input-group">
                <label>新活动满减条件（例如200-30）：</label>
                <input type="number" id="newFull" placeholder="满减金额（满）" step="100">
                <input type="number" id="newReduce" placeholder="减多少" step="10">
            </div>

            <button onclick="calculatePrice()">立即计算</button>
        </div>

        <!-- 输出区 -->
        <div class="output-section">
            <h3>计算结果：</h3>
            <div class="result" id="result">
                请输入参数后点击计算
            </div>
        </div>
    </div>

    <script>
        function calculatePrice() {
            // 获取输入值
            const originalFull = parseFloat(document.getElementById('originalFull').value);
            const originalReduce = parseFloat(document.getElementById('originalReduce').value);
            const originalPrice = parseFloat(document.getElementById('originalPrice').value);
            const newFull = parseFloat(document.getElementById('newFull').value);
            const newReduce = parseFloat(document.getElementById('newReduce').value);

            // 计算原活动的到手价y
            const y = originalPrice - Math.floor(originalPrice / originalFull) * originalReduce;

            // 计算新活动需要的标价z
            let z = y;
            let iterations = 0;
            const maxIterations = 1000;
            
            // 使用迭代法求解方程：y = z - Math.floor(z/newFull)*newReduce
            while (iterations < maxIterations) {
                const currentY = z - Math.floor(z / newFull) * newReduce;
                if (Math.abs(currentY - y) < 0.01) break;
                
                const adjustment = (y - currentY) / (1 - (Math.floor((z + 1)/newFull) - Math.floor(z/newFull)) * newReduce);
                z += adjustment;
                iterations++;
            }

            // 显示结果
            document.getElementById('result').innerHTML = `
                <p>原活动到手价：¥${y.toFixed(2)}</p>
                <p>新活动应设标价：
                    <span class="price-display" onclick="copyToClipboard(${z.toFixed(2)})">
                        ¥${z.toFixed(2)}
                        <span class="copy-notification" id="copyNotice"></span>
                    </span>
                </p>
                <p>验证计算：</p>
                <p>新活动满减次数：${Math.floor(z / newFull)}次</p>
                <p>新到手价：¥${(z - Math.floor(z / newFull) * newReduce).toFixed(2)}</p>
            `;
        }

        function copyToClipboard(value) {
            navigator.clipboard.writeText(value.toString()).then(() => {
                const notice = document.getElementById('copyNotice');
                notice.textContent = '已复制！';
                notice.style.color = 'green';
                setTimeout(() => {
                    notice.textContent = '';
                }, 2000);
            });
        }
    </script>
</body>
</html>
